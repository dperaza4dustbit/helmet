---
changelog:
  exclude:
    authors:
      - dependabot[bot]
  categories:
    - title: "Breaking Changes"
      labels:
        - breaking-change
    - title: "Features"
      labels:
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
    - title: "Documentation"
      labels:
        - documentation
    - title: "Maintenance"
      labels:
        - chore
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"